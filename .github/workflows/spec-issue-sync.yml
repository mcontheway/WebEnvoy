name: Spec Issue Sync

on:
  push:
    branches:
      - main
    paths:
      - 'docs/dev/specs/**/spec.md'

jobs:
  sync-issue:
    name: Sync Spec to Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Specs
        id: changed-specs
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"
          after_sha="${{ github.sha }}"

          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff-tree --no-commit-id --name-only -r "$after_sha" | grep '^docs/dev/specs/.*/spec\.md$' || true)"
          else
            changed_files="$(git diff --name-only "$before_sha" "$after_sha" | grep '^docs/dev/specs/.*/spec\.md$' || true)"
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "$changed_files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Process Each Spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          while IFS= read -r file; do
            if [ ! -f "$file" ]; then continue; fi
            
            DIR_NAME=$(dirname "$file" | xargs basename)
            TITLE=$(head -n 1 "$file" | sed 's/^# //')
            ISSUE_TITLE="[$DIR_NAME] $TITLE"
            
            EXISTING_ISSUE="$(
              gh issue list \
                --repo "${{ github.repository }}" \
                --state all \
                --search "\"[$DIR_NAME]\" in:title" \
                --limit 100 \
                --json number,title \
                --jq '.[] | select(.title | startswith("['"$DIR_NAME"'] ")) | .number' \
                | head -n 1
            )"

            ISSUE_BODY="$(printf '%s\n\n- 规范路径：`%s`\n- 目录标识：`%s`\n\n%s' \
              '此 Issue 由 CI 自动同步维护。' \
              "$file" \
              "$DIR_NAME" \
              '如需修订正式契约，请修改对应 `spec.md` 并通过独立 PR 合入。')"
            
            if [ -z "$EXISTING_ISSUE" ]; then
              echo "创建新的 Issue: $TITLE ($DIR_NAME)"
              gh issue create \
                --repo "${{ github.repository }}" \
                --title "[$DIR_NAME] $TITLE" \
                --body "$ISSUE_BODY"
            else
              echo "Issue #$EXISTING_ISSUE 已存在，更新正文。"
              gh issue edit "$EXISTING_ISSUE" \
                --repo "${{ github.repository }}" \
                --title "$ISSUE_TITLE" \
                --body "$ISSUE_BODY"
            fi
          done <<< "${{ steps.changed-specs.outputs.files }}"
