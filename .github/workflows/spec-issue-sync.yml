name: Spec Issue Sync

on:
  push:
    branches:
      - main
    paths:
      - 'docs/dev/specs/**/spec.md'
      - '.github/spec-issue-sync-map.yml'
      - 'scripts/spec-issue-sync.sh'
      - 'scripts/spec-issue-sync-map.sh'
      - '.github/workflows/spec-issue-sync.yml'
  workflow_dispatch:

jobs:
  sync-issue:
    name: Sync Spec to Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Specs
        id: changed-specs
        run: |
          set -euo pipefail

          full_sync=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            full_sync=true
            changed_files=""
          else
            before_sha="${{ github.event.before }}"
            after_sha="${{ github.sha }}"

            if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$after_sha" || true)"
            else
              changed_files="$(git diff --name-only "$before_sha" "$after_sha" || true)"
            fi
          fi

          map_changed=false
          sync_logic_changed=false

          while IFS= read -r changed_file; do
            [ -n "$changed_file" ] || continue
            case "$changed_file" in
              .github/spec-issue-sync-map.yml)
                map_changed=true
                ;;
              scripts/spec-issue-sync.sh|scripts/spec-issue-sync-map.sh|.github/workflows/spec-issue-sync.yml)
                sync_logic_changed=true
                ;;
            esac
          done <<< "$changed_files"

          if [ "$map_changed" = true ] || [ "$sync_logic_changed" = true ]; then
            full_sync=true
          fi

          if [ "$full_sync" = true ]; then
            spec_files="$(git ls-files 'docs/dev/specs/**/spec.md' | sort -u)"
          else
            spec_files="$(grep '^docs/dev/specs/.*/spec\.md$' <<< "$changed_files" | sort -u || true)"
          fi

          {
            echo 'files<<EOF'
            printf '%s\n' "$spec_files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Process Each Spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bash scripts/spec-issue-sync-map.sh validate

          while IFS= read -r file; do
            if [ ! -f "$file" ]; then continue; fi
            issue_number="$(bash scripts/spec-issue-sync-map.sh resolve "$file")"
            echo "同步 ${file} -> canonical issue #${issue_number}"
            bash scripts/spec-issue-sync.sh sync "${{ github.repository }}" "$file" "${issue_number}"
          done <<< "${{ steps.changed-specs.outputs.files }}"
