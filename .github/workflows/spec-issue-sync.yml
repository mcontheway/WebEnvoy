name: Spec Issue Sync

on:
  push:
    branches:
      - main
    paths:
      - 'docs/dev/specs/**'
      - '.github/spec-issue-sync-map.yml'
      - 'scripts/spec-issue-sync.sh'
      - 'scripts/spec-issue-sync-map.sh'
      - '.github/workflows/spec-issue-sync.yml'
  workflow_dispatch:

jobs:
  sync-issue:
    name: Sync Spec to Issue
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Specs
        id: changed-specs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          changed_spec_file="$(mktemp)"
          initial_mapped_spec_file="$(mktemp)"
          remapped_spec_file="$(mktemp)"
          allow_bootstrap_file="$(mktemp)"
          before_sha=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git ls-files 'docs/dev/specs/**/spec.md' | sort -u > "$changed_spec_file"
          else
            before_sha="${{ github.event.before }}"
            after_sha="${{ github.sha }}"

            if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$after_sha" || true)"
            else
              changed_files="$(git diff --name-only "$before_sha" "$after_sha" || true)"
            fi

            grep -E '^docs/dev/specs/FR-[^/]+/.+$' <<< "$changed_files" \
              | sed -n 's#^\(docs/dev/specs/FR-[^/]\+\)/.*$#\1/spec.md#p' \
              | sort -u > "$changed_spec_file" || true

            if grep -Fxq '.github/spec-issue-sync-map.yml' <<< "$changed_files"; then
              old_map_file="$(mktemp)"
              if git cat-file -e "${before_sha}:.github/spec-issue-sync-map.yml" 2>/dev/null; then
                git show "${before_sha}:.github/spec-issue-sync-map.yml" > "$old_map_file"
              else
                : > "$old_map_file"
              fi

              bash scripts/spec-issue-sync-map.sh diff-specs "$old_map_file" .github/spec-issue-sync-map.yml \
                | awk -F'\t' 'NF == 3 && $2 == "" && $3 != "" { print $1 }' \
                | sort -u > "$initial_mapped_spec_file"

              bash scripts/spec-issue-sync-map.sh diff-specs "$old_map_file" .github/spec-issue-sync-map.yml \
                | awk -F'\t' 'NF == 3 && $2 != "" && $3 != ""' \
                | sort -u > "$remapped_spec_file"

              rm -f "$old_map_file"
            fi
          fi

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            issue_number="$(SPEC_SYNC_MAP_SKIP_VALIDATE=1 bash scripts/spec-issue-sync-map.sh resolve "$file")"
            if bash scripts/spec-issue-sync.sh suite-mentions-issue "$file" "$issue_number"; then
              printf '%s\n' "$file" >> "$allow_bootstrap_file"
            fi
          done < "$changed_spec_file"

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            issue_number="$(SPEC_SYNC_MAP_SKIP_VALIDATE=1 bash scripts/spec-issue-sync-map.sh resolve "$file")"
            if bash scripts/spec-issue-sync.sh suite-mentions-issue "$file" "$issue_number"; then
              printf '%s\n' "$file" >> "$allow_bootstrap_file"
            fi
          done < "$initial_mapped_spec_file"

          if [ -n "$before_sha" ] && ! git cat-file -e "${before_sha}:.github/spec-issue-sync-map.yml" 2>/dev/null; then
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              if git cat-file -e "${before_sha}:${file}" 2>/dev/null; then
                printf '%s\n' "$file" >> "$allow_bootstrap_file"
              fi
            done < "$initial_mapped_spec_file"
          fi
          sort -u -o "$allow_bootstrap_file" "$allow_bootstrap_file"

          {
            echo 'files<<EOF'
            cat "$changed_spec_file"
            echo 'EOF'
            echo 'initial_mapped<<EOF'
            cat "$initial_mapped_spec_file"
            echo 'EOF'
            echo 'remapped<<EOF'
            cat "$remapped_spec_file"
            echo 'EOF'
            echo 'allow_bootstrap<<EOF'
            cat "$allow_bootstrap_file"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          rm -f "$changed_spec_file" "$initial_mapped_spec_file" "$remapped_spec_file" "$allow_bootstrap_file"

      - name: Process Each Spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bash scripts/spec-issue-sync-map.sh validate
          allow_bootstrap_file="$(mktemp)"
          changed_spec_file="$(mktemp)"
          initial_mapped_spec_file="$(mktemp)"
          remapped_spec_file="$(mktemp)"
          skip_validation_file="$(mktemp)"
          target_validation_file="$(mktemp)"

          printf '%s\n' "${{ steps.changed-specs.outputs.allow_bootstrap }}" | sed '/^$/d' | sort -u > "$allow_bootstrap_file"
          printf '%s\n' "${{ steps.changed-specs.outputs.files }}" | sed '/^$/d' | sort -u > "$changed_spec_file"
          printf '%s\n' "${{ steps.changed-specs.outputs.initial_mapped }}" | sed '/^$/d' | sort -u > "$initial_mapped_spec_file"
          printf '%s\n' "${{ steps.changed-specs.outputs.remapped }}" | sed '/^$/d' | sort -u > "$remapped_spec_file"
          cut -f1 "$remapped_spec_file" | sed '/^$/d' | sort -u > "$skip_validation_file"
          cat "$changed_spec_file" "$initial_mapped_spec_file" | sed '/^$/d' | sort -u > "$target_validation_file"

          bash scripts/spec-issue-sync-map.sh validate-issues "${{ github.repository }}" "$allow_bootstrap_file" "$skip_validation_file" "$target_validation_file"

          while IFS= read -r file; do
            if [ ! -f "$file" ]; then continue; fi
            if grep -Fxq "$file" "$skip_validation_file"; then
              continue
            fi
            issue_number="$(SPEC_SYNC_MAP_SKIP_VALIDATE=1 bash scripts/spec-issue-sync-map.sh resolve "$file")"

            if bash scripts/spec-issue-sync.sh check-anchor "${{ github.repository }}" "$file" "${issue_number}" >/dev/null 2>&1; then
              echo "同步 ${file} -> canonical issue #${issue_number}"
              bash scripts/spec-issue-sync.sh sync "${{ github.repository }}" "$file" "${issue_number}"
              continue
            else
              status=$?
            fi

            if [ "$status" -eq 43 ]; then
              if ! grep -Fxq "$file" "$allow_bootstrap_file"; then
                echo "拒绝首次补锚 ${file}：canonical issue #${issue_number} 尚无 FR 锚定，且 formal suite 未显式绑定该 issue" >&2
                exit 44
              fi

              echo "首次补锚 ${file} -> canonical issue #${issue_number}"
              bash scripts/spec-issue-sync.sh sync-bootstrap "${{ github.repository }}" "$file" "${issue_number}"
              continue
            fi

            exit "$status"
          done < "$changed_spec_file"

          while IFS= read -r file; do
            [ -n "$file" ] || continue
            if grep -Fxq "$file" "$changed_spec_file"; then
              continue
            fi
            if [ ! -f "$file" ]; then
              echo "跳过 ${file}：对应 spec.md 尚未落地"
              continue
            fi

            issue_number="$(SPEC_SYNC_MAP_SKIP_VALIDATE=1 bash scripts/spec-issue-sync-map.sh resolve "$file")"
            if bash scripts/spec-issue-sync.sh check-anchor "${{ github.repository }}" "$file" "${issue_number}" >/dev/null 2>&1; then
              echo "同步首次映射 ${file} -> canonical issue #${issue_number}"
              bash scripts/spec-issue-sync.sh sync "${{ github.repository }}" "$file" "${issue_number}"
              continue
            else
              status=$?
            fi

            if [ "$status" -eq 43 ] && grep -Fxq "$file" "$allow_bootstrap_file"; then
              echo "首次补锚 ${file} -> canonical issue #${issue_number}"
              bash scripts/spec-issue-sync.sh sync-bootstrap "${{ github.repository }}" "$file" "${issue_number}"
              continue
            fi

            exit "$status"
          done < "$initial_mapped_spec_file"

          while IFS=$'\t' read -r file old_issue_number new_issue_number; do
            [ -n "$file" ] || continue
            if [ ! -f "$file" ]; then
              echo "跳过 ${file}：对应 spec.md 尚未落地"
              continue
            fi

            if bash scripts/spec-issue-sync.sh can-sync-map-remap "${{ github.repository }}" "$file" "${old_issue_number}" "${new_issue_number}"; then
              echo "同步 remapped ${file} -> canonical issue #${new_issue_number}"
              bash scripts/spec-issue-sync.sh sync-map-remap "${{ github.repository }}" "$file" "${old_issue_number}" "${new_issue_number}"
              continue
            else
              status=$?
            fi

            if [ "$status" -eq 44 ]; then
              echo "拒绝 remapped ${file} -> #${new_issue_number}：新 canonical issue 尚未满足受控同步前置" >&2
              exit 44
            fi
            exit "$status"
          done < "$remapped_spec_file"

          rm -f "$allow_bootstrap_file" "$changed_spec_file" "$initial_mapped_spec_file" "$remapped_spec_file" "$skip_validation_file" "$target_validation_file"
