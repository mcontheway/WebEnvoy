name: Sync FR to GitHub Issues

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - 'docs/FR.md' # 只有当 FR.md 发生变更时才触发此 workflow

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Sync FR to Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/sync_fr.py
