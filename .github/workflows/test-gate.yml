name: Test Gate

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify Change Scope
        id: change-scope
        run: |
          set -euo pipefail

          mapfile -t changed_files < <(git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")

          process_only="yes"
          if [ "${#changed_files[@]}" -eq 0 ]; then
            process_only="no"
          else
            for file in "${changed_files[@]}"; do
              case "$file" in
                "AGENTS.md"|\
                "code_review.md"|\
                "scripts/pr-guardian.sh"|\
                "scripts/merge-pr.sh"|\
                ".github/workflows/test-gate.yml"|\
                "tests/pr-guardian.merge-guard.test.sh")
                  ;;
                *)
                  process_only="no"
                  break
                  ;;
              esac
            done
          fi

          {
            echo "process_only=$process_only"
            echo "changed_count=${#changed_files[@]}"
          } >> "$GITHUB_OUTPUT"

          echo "Changed files (${#changed_files[@]}):"
          printf '%s\n' "${changed_files[@]}"
          echo "process_only=$process_only"

      - name: Run Process-Only Smoke
        if: ${{ steps.change-scope.outputs.process_only == 'yes' }}
        run: |
          set -euo pipefail
          echo "Process-only change detected, running merge-guard process tests."
          bash tests/pr-guardian.merge-guard.test.sh
          bash -n scripts/pr-guardian.sh
          bash -n scripts/merge-pr.sh
          bash scripts/merge-pr.sh --help >/dev/null

      - name: Setup Node.js
        if: ${{ steps.change-scope.outputs.process_only != 'yes' && hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '23.9.0'

      - name: Install Dependencies
        if: ${{ steps.change-scope.outputs.process_only != 'yes' && hashFiles('package.json') != '' }}
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found. Skipping npm install."
          fi

      - name: Detect Test Plan
        id: detect-tests
        if: ${{ steps.change-scope.outputs.process_only != 'yes' }}
        run: |
          set -euo pipefail

          if [ ! -f package.json ]; then
            echo "has_package=no" >> "$GITHUB_OUTPUT"
            echo "unit_dir=no" >> "$GITHUB_OUTPUT"
            echo "integration_dir=no" >> "$GITHUB_OUTPUT"
            echo "unit_cmd=" >> "$GITHUB_OUTPUT"
            echo "integration_cmd=" >> "$GITHUB_OUTPUT"
            echo "No package.json found. Skipping test planning."
            exit 0
          fi

          has_test_script="$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.scripts && pkg.scripts.test ? 'yes' : 'no')")"
          has_unit_script="$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.scripts && pkg.scripts['test:unit'] ? 'yes' : 'no')")"
          has_integration_script="$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.scripts && pkg.scripts['test:integration'] ? 'yes' : 'no')")"
          has_e2e_script="$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.scripts && pkg.scripts['test:e2e'] ? 'yes' : 'no')")"

          has_unit_dir="no"
          if find . \
            \( -path './node_modules' -o -path './.git' \) -prune -o \
            -type d -name __tests__ -print -quit | grep -q .; then
            has_unit_dir="yes"
          fi

          has_integration_dir="no"
          if [ -d tests ]; then
            has_integration_dir="yes"
          fi

          unit_cmd=""
          integration_cmd=""

          if [ "$has_unit_dir" = "yes" ]; then
            if [ "$has_unit_script" = "yes" ]; then
              unit_cmd="npm run test:unit"
            elif [ "$has_test_script" = "yes" ]; then
              unit_cmd="npm test"
            else
              echo "__tests__ 目录已存在，但 package.json 中没有可执行的测试脚本（期望 test:unit 或 test）。" >&2
              exit 1
            fi
          fi

          if [ "$has_integration_dir" = "yes" ]; then
            if [ "$has_integration_script" = "yes" ]; then
              integration_cmd="npm run test:integration"
            elif [ "$has_e2e_script" = "yes" ]; then
              integration_cmd="npm run test:e2e"
            elif [ "$has_test_script" = "yes" ]; then
              integration_cmd="npm test"
            else
              echo "tests/ 目录已存在，但 package.json 中没有可执行的集成测试脚本（期望 test:integration、test:e2e，或由 test 统一承载）。" >&2
              exit 1
            fi
          fi

          {
            echo "has_package=yes"
            echo "unit_dir=$has_unit_dir"
            echo "integration_dir=$has_integration_dir"
            echo "unit_cmd=$unit_cmd"
            echo "integration_cmd=$integration_cmd"
          } >> "$GITHUB_OUTPUT"

      - name: Run Unit Tests
        if: ${{ steps.change-scope.outputs.process_only != 'yes' && steps.detect-tests.outputs.unit_cmd != '' }}
        run: |
          set -euo pipefail
          echo "Running unit tests with: ${{ steps.detect-tests.outputs.unit_cmd }}"
          ${{ steps.detect-tests.outputs.unit_cmd }}

      - name: Run E2E/Integration Tests
        if: ${{ steps.change-scope.outputs.process_only != 'yes' && steps.detect-tests.outputs.integration_cmd != '' && steps.detect-tests.outputs.integration_cmd != steps.detect-tests.outputs.unit_cmd }}
        run: |
          set -euo pipefail
          echo "Running integration tests with: ${{ steps.detect-tests.outputs.integration_cmd }}"
          ${{ steps.detect-tests.outputs.integration_cmd }}

      - name: No Tests Declared
        if: ${{ steps.change-scope.outputs.process_only != 'yes' && (steps.detect-tests.outputs.has_package == 'no' || (steps.detect-tests.outputs.unit_dir == 'no' && steps.detect-tests.outputs.integration_dir == 'no')) }}
        run: |
          echo "No package-managed tests detected for this repository state."
