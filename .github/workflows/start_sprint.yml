name: Start New Sprint

on:
  workflow_dispatch:
    inputs:
      sprint_name:
        description: 'Sprint 战役名称 (建议符合 sprint-[语义目标] 格式，如 sprint-core-engine-init)'
        required: true
        default: 'sprint-core-engine-init'
      sprint_desc:
        description: 'Sprint 描述与迭代目标'
        required: false

jobs:
  start_sprint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Ensure Milestone Exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EXISTING_MS="$(
            gh api "repos/${{ github.repository }}/milestones?state=all&per_page=100" \
              --jq '.[] | select(.title == "${{ github.event.inputs.sprint_name }}") | .title' \
              | head -n 1
          )"

          if [ -z "$EXISTING_MS" ]; then
            echo "正在为您创建新的 Sprint 里程碑: ${{ github.event.inputs.sprint_name }}"
            gh api "repos/${{ github.repository }}/milestones" \
              --method POST \
              -f title="${{ github.event.inputs.sprint_name }}" \
              -f description="${{ github.event.inputs.sprint_desc }}"
          else
            echo "里程碑 ${{ github.event.inputs.sprint_name }} 已存在。"
          fi
